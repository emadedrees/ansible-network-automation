---
- name: Create an AWS EC2 instance
  hosts: localhost
  connection: local
  gather_facts: false

  vars:
    ansible_python_interpreter: "{{ ansible_playbook_python }}"

    aws_region: "eu-north-1"
    ec2_instance_name: "ansible-instance"
    ec2_key_name: "REPLACE_WITH_YOUR_KEY_PAIR_NAME"
    ec2_instance_type: "t3.micro"

    ec2_subnet_id: "subnet-REPLACE_WITH_YOUR_SUBNET_ID"
    ec2_security_group_id: "sg-REPLACE_WITH_YOUR_SECURITY_GROUP_ID"

    # AMI IDs are unique to each AWS Region.
    ec2_ami_id: "ami-068b5bc67e48209c1"

  vars_files:
    - "{{ playbook_dir }}/../../../group_vars/all/pass.yml"

  tasks:
    - name: Create and start EC2 instance
      amazon.aws.ec2_instance:
        name: "{{ ec2_instance_name }}"
        key_name: "{{ ec2_key_name }}"
        instance_type: "{{ ec2_instance_type }}"
        region: "{{ aws_region }}"
        image_id: "{{ ec2_ami_id }}"

        # AWS credentials loaded from Ansible Vault.
        access_key: "{{ ec2_access_key }}"
        secret_key: "{{ ec2_secret_key }}"

        network_interfaces:
          - device_index: 0
            subnet_id: "{{ ec2_subnet_id }}"
            groups:
              - "{{ ec2_security_group_id }}"
            assign_public_ip: true

        state: started
        wait: true
        wait_timeout: 600

        tags:
          Environment: "Lab"
          Project: "Ansible AWS Provisioning"
          ManagedBy: "Ansible"

      register: ec2_result

    - name: Display created EC2 instance information
      ansible.builtin.debug:
        msg:
          - "Instance ID: {{ ec2_result.instances[0].instance_id }}"
          - "State: {{ ec2_result.instances[0].state.name }}"
          - >-
            Public IP:
            {{ ec2_result.instances[0].public_ip_address
               | default('Not assigned', true) }}
          - "Private IP: {{ ec2_result.instances[0].private_ip_address }}"